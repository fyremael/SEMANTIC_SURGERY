name: ci
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e .[dev]
      - run: css-probes run-all --out reports/css_probe_report.json
      - run: css-probes real list-adapters
      - run: pytest -q
